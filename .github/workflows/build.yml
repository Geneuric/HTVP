name: Build HTVP

concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  workflow_dispatch: # Gives you the manual 'Run workflow' button in GitHub
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'
      - '.gitignore'

permissions:
  contents: write # CRITICAL: Allows the action to push the compiled plugin to your repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout Builds Branch
        uses: actions/checkout@v4
        continue-on-error: true # Prevents crash on a brand new repository
        with:
          ref: "builds"
          path: "builds"
          
      - name: Initialize Builds Branch (If Missing)
        run: |
          if [ ! -d "builds/.git" ]; then
            echo "Builds branch missing. Initializing new orphan branch..."
            mkdir -p builds
            cd builds
            git init
            git checkout --orphan builds
            git config --local user.email "actions@github.com"
            git config --local user.name "GitHub Actions"
            echo "Init" > dummy.txt
            git add dummy.txt
            git commit -m "Initialize builds branch"
          fi

      - name: Clean Old Builds
        run: rm -f $GITHUB_WORKSPACE/builds/*.cs3

      - name: Setup Fast JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      - name: Compile HTVP Plugin
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds/
          cp build/plugins.json $GITHUB_WORKSPACE/builds/

      - name: Push Release to Repository
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Deploy HTVP Build $GITHUB_SHA" || git commit -m "Deploy HTVP Build $GITHUB_SHA" || exit 0
          git push --force -u origin builds
